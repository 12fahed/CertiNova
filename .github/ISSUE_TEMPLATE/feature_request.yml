name: Feature Request
description: Suggest a new feature or enhancement for CertiNova
title: "[FEATURE]: "
labels: ["enhancement", "needs-triage"]

body:
  - type: markdown
    attributes:
      value: |
        ## Thanks for your idea!
        We're always looking to improve CertiNova.

  - type: checkboxes
    attributes:
      label: Pre-checks
      options:
        - label: I have searched for existing feature requests
          required: true
        - label: I have checked if this is already planned in the roadmap
          required: false

  - type: dropdown
    attributes:
      label: Feature Category
      description: What area does this feature affect?
      options:
        - Certificate Generation
        - Template Management
        - Data Processing (CSV/Excel)
        - Security & Encryption
        - API/Integration
        - UI/UX Improvements
        - Performance
        - Documentation
        - DevOps/Deployment
    validations:
      required: true

  - type: dropdown
    attributes:
      label: Priority (Your Perspective)
      options:
        - Critical - Blocking my workflow
        - High - Would greatly improve experience
        - Medium - Nice to have
        - Low - Just a thought
    validations:
      required: true

  - type: textarea
    attributes:
      label: Problem Statement
      description: What problem does this solve?
      placeholder: Currently, users have to manually X, which causes Y...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Proposed Solution
      description: How do you envision this working?
      placeholder: Add a bulk upload feature that supports drag-and-drop...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Alternative Solutions
      description: What alternative approaches have you considered?
      placeholder: Could also use an external API, but that's less secure...

  - type: textarea
    attributes:
      label: User Flow / Mockups
      description: If UI-related, describe the user interaction or attach mockups
      placeholder: |
        1. User clicks "Advanced Settings"
        2. New drawer opens with...
        [Attach mockup image]

  - type: textarea
    attributes:
      label: Technical Considerations (Optional)
      description: Any technical insights about implementation?
      placeholder: This could use Web Workers for background processing...

  - type: textarea
    attributes:
      label: Potential Challenges
      description: What could go wrong or be difficult?
      placeholder: Might impact memory usage with large datasets...

  - type: checkboxes
    attributes:
      label: Would you be willing to contribute?
      description: We love first-time contributors!
      options:
        - label: Yes, I can help implement this
        - label: No, but I can help test
    validations:
      required: false

  - type: checkboxes
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
